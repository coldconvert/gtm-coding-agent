# fly.toml — GTM Signals Dashboard
# Deploy from starters/signals-dashboard/ with: fly deploy

app = 'gtm-signals-dashboard'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "8080"

# Runtime secrets — set these with fly secrets set before deploying:
#   fly secrets set SUPABASE_URL=https://... SUPABASE_SERVICE_KEY=...

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = 'off'
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ['app']

[[http_service.checks]]
  grace_period = "15s"
  interval     = "30s"
  method       = "GET"
  path         = "/"
  timeout      = "5s"

[[vm]]
  cpu_kind  = 'shared'
  cpus      = 1
  memory_mb = 512
